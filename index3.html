<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uma carta da Terra-Média 🍃</title>
  <style>
    :root {
      --cor-fundo: #2e2417;
      --cor-pergaminho: #f1e3c2;
      --cor-pergaminho-escuro: #e3cf9d;
      --cor-tinta: #4a3522;
      --cor-verde: #4f6b3e;
      --cor-verde-escuro: #34461f;
      --cor-dourado: #b5891f;
      --cor-vermelho: #7a2e1d;
    }

    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at top, #4a3a22 0%, #241c10 70%),
        linear-gradient(180deg, #2e2417 0%, #1c150c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IM Fell English', serif;
      overflow: hidden;
      position: relative;
    }

    /* ---- Folhas e brilhos flutuantes ---- */
    .floaties {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .floaty {
      position: absolute;
      font-size: 1.3rem;
      opacity: 0.4;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.25; }
      50%  { opacity: 0.55; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ---- Cena principal ---- */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      user-select: none;
    }

    .title-rune {
      font-family: 'Cinzel Decorative', cursive;
      color: var(--cor-dourado);
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin-bottom: 14px;
      text-shadow: 0 0 12px rgba(181,137,31,0.5);
      text-align: center;
    }

    /* ---- Hobbit SVG ---- */
    .hobbit-wrap {
      position: relative;
      width: 230px;
      height: 250px;
      animation: hobbitSway 3.2s ease-in-out infinite;
    }

    @keyframes hobbitSway {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-7px) rotate(1deg); }
    }

    .hobbit-wrap svg { width: 100%; height: 100%; }

    /* ---- Carta (segurada pelo hobbit) ---- */
    .envelope-wrap {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) rotate(-6deg);
      cursor: pointer;
      transition: transform 0.2s ease;
      z-index: 5;
    }

    .envelope-wrap:hover { transform: translateX(-50%) rotate(-6deg) scale(1.08); }
    .envelope-wrap:active { transform: translateX(-50%) rotate(-6deg) scale(0.96); }

    .envelope {
      width: 70px;
      height: 50px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .hint {
      margin-top: 14px;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--cor-pergaminho-escuro);
      opacity: 0.85;
      animation: pulse 2.4s ease-in-out infinite;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.95; }
    }

    /* ---- Modal da carta ---- */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 4, 0.72);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.35s ease;
    }

    .overlay.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .letter-card {
      background:
        radial-gradient(ellipse at 20% 10%, rgba(0,0,0,0.06), transparent 60%),
        radial-gradient(ellipse at 90% 90%, rgba(0,0,0,0.08), transparent 60%),
        var(--cor-pergaminho);
      border: 3px solid var(--cor-dourado);
      outline: 1px solid #6b4a1a;
      outline-offset: -8px;
      border-radius: 6px;
      padding: 46px 42px 38px;
      max-width: 440px;
      width: 90%;
      position: relative;
      box-shadow: 0 18px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(120,90,30,0.15);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .letter-card .deco-top {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .letter-card .deco-corner {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.7;
      color: var(--cor-verde-escuro);
    }
    .letter-card .deco-corner.tl { top: 10px; left: 12px; }
    .letter-card .deco-corner.tr { top: 10px; right: 12px; }
    .letter-card .deco-corner.bl { bottom: 10px; left: 12px; }
    .letter-card .deco-corner.br { bottom: 10px; right: 12px; }

    .letter-card h2 {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--cor-vermelho);
      margin-bottom: 18px;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .letter-card p {
      font-family: 'IM Fell English', serif;
      font-size: 1.18rem;
      color: var(--cor-tinta);
      line-height: 1.85;
      white-space: pre-line;
      text-align: left;
    }

    .letter-card p i {
      font-style: italic;
    }

    .letter-divider {
      margin: 18px auto;
      width: 70px;
      border: none;
      border-top: 2px solid var(--cor-dourado);
      opacity: 0.6;
    }

    .close-btn {
      margin-top: 28px;
      background: linear-gradient(135deg, var(--cor-verde), var(--cor-verde-escuro));
      color: var(--cor-pergaminho);
      border: 1px solid var(--cor-dourado);
      border-radius: 4px;
      padding: 10px 30px;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 1px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }

    .close-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    }

    /* ---- Folhas ao abrir ---- */
    .heart-burst {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 1.5rem;
    }

    .heart-burst span {
      position: absolute;
      animation: burstFly 1.1s ease-out forwards;
    }

    @keyframes burstFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="floaties" id="floaties"></div>

  <div class="scene">
    <div class="title-rune">✶ uma mensagem vinda do Condado ✶</div>

    <div class="hobbit-wrap">
      <!-- Hobbit SVG desenhado à mão -->
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <!-- Pés grandes e peludos -->
        <ellipse cx="74" cy="206" rx="22" ry="11" fill="#caa06b"/>
        <ellipse cx="126" cy="206" rx="22" ry="11" fill="#caa06b"/>
        <ellipse cx="74" cy="202" rx="17" ry="6" fill="#5a3c22"/>
        <ellipse cx="126" cy="202" rx="17" ry="6" fill="#5a3c22"/>

        <!-- Capa / corpo -->
        <path d="M 60 110 Q 100 95 140 110 L 150 195 Q 100 210 50 195 Z" fill="#4f6b3e"/>
        <path d="M 60 110 Q 100 95 140 110 L 150 195 Q 100 210 50 195 Z" fill="none" stroke="#34461f" stroke-width="2" opacity="0.5"/>

        <!-- Cinto -->
        <rect x="62" y="150" width="76" height="9" rx="3" fill="#6b4a1a"/>
        <rect x="93" y="149" width="14" height="11" rx="2" fill="#b5891f"/>

        <!-- Braços -->
        <ellipse cx="48" cy="140" rx="13" ry="24" fill="#4f6b3e" transform="rotate(15 48 140)"/>
        <ellipse cx="152" cy="140" rx="13" ry="24" fill="#4f6b3e" transform="rotate(-15 152 140)"/>

        <!-- Mãos -->
        <circle cx="42" cy="163" r="10" fill="#e8c79c"/>
        <circle cx="158" cy="163" r="10" fill="#e8c79c"/>

        <!-- Pescoço -->
        <rect x="90" y="92" width="20" height="16" fill="#e8c79c"/>

        <!-- Cabeça -->
        <circle cx="100" cy="72" r="38" fill="#e8c79c"/>

        <!-- Orelhas pontudas -->
        <path d="M 64 68 Q 52 60 58 78 Q 64 80 68 74 Z" fill="#e8c79c"/>
        <path d="M 136 68 Q 148 60 142 78 Q 136 80 132 74 Z" fill="#e8c79c"/>

        <!-- Cabelo cacheado -->
        <path d="M 66 52 Q 60 30 80 28 Q 90 14 110 28 Q 130 30 134 52 Q 124 42 116 46 Q 108 36 100 46 Q 92 36 84 46 Q 76 42 66 52 Z" fill="#7a5530"/>

        <!-- Sobrancelhas -->
        <path d="M 80 64 Q 86 60 92 64" stroke="#5a3c22" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 108 64 Q 114 60 120 64" stroke="#5a3c22" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Olhos -->
        <circle cx="86" cy="72" r="5" fill="#3a2a18"/>
        <circle cx="114" cy="72" r="5" fill="#3a2a18"/>
        <circle cx="87.5" cy="70.5" r="1.6" fill="#fff"/>
        <circle cx="115.5" cy="70.5" r="1.6" fill="#fff"/>

        <!-- Bochechas -->
        <ellipse cx="74" cy="84" rx="7" ry="5" fill="#e3a589" opacity="0.5"/>
        <ellipse cx="126" cy="84" rx="7" ry="5" fill="#e3a589" opacity="0.5"/>

        <!-- Nariz -->
        <ellipse cx="100" cy="80" rx="4" ry="3" fill="#d9b48a"/>

        <!-- Boca sorrindo -->
        <path d="M 90 90 Q 100 97 110 90" stroke="#7a4a2a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Carta segurada pelo hobbit -->
      <div class="envelope-wrap" onclick="abrirCarta(event)">
        <svg class="envelope" viewBox="0 0 120 86" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="116" height="82" rx="6" fill="#f1e3c2" stroke="#6b4a1a" stroke-width="3"/>
          <path d="M 2 2 L 60 50 L 118 2 Z" fill="#e3cf9d" stroke="#6b4a1a" stroke-width="2.5" stroke-linejoin="round"/>
          <line x1="18" y1="56" x2="102" y2="56" stroke="#6b4a1a" stroke-width="1.3" stroke-dasharray="4 3" opacity="0.6"/>
          <line x1="18" y1="66" x2="80" y2="66" stroke="#6b4a1a" stroke-width="1.3" stroke-dasharray="4 3" opacity="0.6"/>
          <!-- Selo de cera -->
          <circle cx="60" cy="30" r="11" fill="#7a2e1d" transform="translate(0,-2)"/>
          <circle cx="60" cy="28" r="11" fill="#8a3522"/>
          <path d="M 60 22 L 63 28 L 60 34 L 57 28 Z" fill="#b5891f" opacity="0.85"/>
        </svg>
      </div>
    </div>

    <p class="hint"><i>toque no selo para ler a mensagem</i></p>
  </div>

  <div class="overlay" id="overlay" onclick="fecharCarta(event)">
    <div class="letter-card" id="letterCard">
      <div class="deco-top">🍃</div>
      <span class="deco-corner tl">❧</span>
      <span class="deco-corner tr">❧</span>
      <span class="deco-corner bl">❧</span>
      <span class="deco-corner br">❧</span>

      <h2 id="cartaTitulo"></h2>
      <hr class="letter-divider"/>
      <p id="cartaMensagem"></p>

      <button class="close-btn" onclick="fecharCarta()">selar novamente 🕯️</button>
    </div>
  </div>

  <script>
    /* ============================================================
       ✏️  EDITE AQUI — título e mensagem da sua cartinha
       ============================================================ */
    const TITULO = "Saudações vindas do Condado";

    const MENSAGEM = `Bem-vindo, leitor de boa vontade, à minha humilde toca!

Como bem sabeis, há em mim um desejo tão grande quanto a fome de um hobbit perto da hora do segundo café da manhã: o de possuir, enfim, a grande caixa ilustrada de "O Senhor dos Anéis", com seus volumes adornados como as páginas do Livro Vermelho do Limite Oeste.

Que tais tomos repousem em minha estante como um tesouro de Erebor, prontos para serem abertos sempre que a vontade de cruzar as Terras Médias me tomar — da Vila dos Hobbits a Valfenda, de Valfenda às portas sombrias de Mordor.

Se houver bondade em teu coração, como a de um certo mago cinzento que bate à porta sem avisar, considera presentear-me com tal caixa. Eu, em troca, prometo guardar a história com o mesmo carinho de Bilbo ao guardar seu anel — só que sem os efeitos colaterais.

Com gratidão e segunda refeição já a caminho,
um hobbit qualquer 🍃`;
    /* ============================================================ */


    document.getElementById('cartaTitulo').textContent   = TITULO;
    document.getElementById('cartaMensagem').textContent = MENSAGEM;

    const symbols = ['🍃','🌿','⚔️','🍂','✨','🕯️','📜','🦅','🍄'];
    const container = document.getElementById('floaties');

    for (let i = 0; i < 24; i++) {
      const el = document.createElement('div');
      el.className = 'floaty';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left     = Math.random() * 100 + 'vw';
      el.style.top      = Math.random() * 100 + 'vh';
      el.style.fontSize = (0.9 + Math.random() * 1.3) + 'rem';
      el.style.animationDuration  = (8 + Math.random() * 12) + 's';
      el.style.animationDelay     = (Math.random() * 10) + 's';
      container.appendChild(el);
    }

    function abrirCarta(e) {
      e.stopPropagation();
      document.getElementById('overlay').classList.add('active');

      const burst = document.createElement('div');
      burst.className = 'heart-burst';
      burst.style.left = (e.clientX - 20) + 'px';
      burst.style.top  = (e.clientY - 20) + 'px';
      document.body.appendChild(burst);

      for (let i = 0; i < 10; i++) {
        const s = document.createElement('span');
        s.textContent = ['🍃','✨','🌿','🍂','📜'][Math.floor(Math.random()*5)];
        const angle = (Math.PI * 2 / 10) * i;
        const dist  = 60 + Math.random() * 50;
        s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        s.style.animationDelay = (Math.random() * 0.2) + 's';
        burst.appendChild(s);
      }

      setTimeout(() => burst.remove(), 1400);
    }

    function fecharCarta(e) {
      if (e && e.target !== document.getElementById('overlay')) return;
      document.getElementById('overlay').classList.remove('active');
    }

    document.querySelector('.close-btn').onclick = function() {
      document.getElementById('overlay').classList.remove('active');
    };
  </script>
</body>
</html>
